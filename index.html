<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard responsiva</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>
    <div class="layout">
        <div class="menu-lateral">
            <div class="logo">
                <img src="img/logo.png.png" alt="logo donezo">
            </div>
            <div class="menu">
                <h6>MENU</h6>
                <div class="icones">
                    <span class="material-symbols-outlined ativo">dashboard</span>
                    <div class="text"><h5>Dashboard</h5></div>
                </div>
                <div class="icones">
                    <span class="material-symbols-outlined">task</span>
                    <div class="text"><h5>Tasks</h5></div>
                </div>
                <div class="icones">
                    <span class="material-symbols-outlined">calendar_month</span>
                    <div class="text"><h5>Calendar</h5></div>
                </div>
                <div class="icones">
                    <span class="material-symbols-outlined">bar_chart</span>
                    <div class="text"><h5>Analytics</h5></div>
                </div>
                <div class="icones">
                    <span class="material-symbols-outlined">group</span>
                    <div class="text"><h5>Team</h5></div>
                </div>
            </div>
            <div class="general">
                <h6>GENERAL</h6>
                <div class="icones">
                    <span class="material-symbols-outlined">settings</span>
                    <div class="text"><h5>Settings</h5></div>
                </div>
                <div class="icones">
                    <span class="material-symbols-outlined">help</span>
                    <div class="text"><h5>Help</h5></div>
                </div>
                <div class="icones">
                    <span class="material-symbols-outlined">logout</span>
                    <div class="text"><h5>Logout</h5></div>
                </div>
            </div>
            <div class="download">

            </div>
        </div>




        <div class="container">
            <div class="cabecalho">
                
            </div>



            <div class="dashboard">
                <div class="intro">
                    
                </div>
                <div class="area-menor">
                    <div class="card">
                        
                    </div>
                </div>
                <div class="area-maior">
                    
                </div>
            </div>
        </div>
    </div>
</body>
</html>
